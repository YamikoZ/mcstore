# ==========================================
# MCStore Plugin - HTTP API Edition v4.0
# ==========================================

# ==========================================
# 🌐 API Configuration
# ==========================================
api:
  # URL เว็บ MCStore (ไม่ต้องใส่ / ท้าย)
  url: "https://yoursite.com"

  # Server ID ต้องตรงกับ servers.id ใน Database
  # เช่น: survival, lobby, skyblock, creative, prison
  server_id: "survival"

  # Plugin API Secret — ตั้งค่าใน Admin → Settings → Plugin
  # ต้องตรงกันทุกตัวอักษร ห้ามหลุดเด็ดขาด!
  secret: "YOUR_PLUGIN_API_SECRET"

# ==========================================
# ⚙️ Settings
# ==========================================
settings:
  # ความถี่ Poll API (หน่วย Ticks | 20 ticks = 1 วินาที)
  # 600 ticks = 30 วินาที (แนะนำ)
  polling_interval_ticks: 600

  # คำสั่งสูงสุดที่รันได้ต่อ 1 รอบ
  max_commands_per_cycle: 20

# ==========================================
# ✅ Command Whitelist
# ==========================================
# อนุญาตเฉพาะคำสั่งเหล่านี้เท่านั้น (ไม่ต้องใส่ /)
# คำสั่ง execute/run จะถูกบล็อกอัตโนมัติเสมอ
allowed_commands:
  - "give"
  - "eco"
  - "lp"
  - "say"
  - "broadcast"
  - "points"
  - "crate"
  - "vouchers"
  - "perm"
  - "rank"
  - "booster"
  - "is"
  - "plot"
  - "enchant"
